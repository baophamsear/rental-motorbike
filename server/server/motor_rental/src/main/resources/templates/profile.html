<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thông tin người dùng</title>
</head>
<body>
<h1>Thông tin người dùng</h1>
<p>Họ tên: <span th:text="${user.fullName}">Tên</span></p>
<p>Email: <span th:text="${user.email}">Email</span></p>
<p>Số điện thoại: <span th:text="${user.phone}">Số điện thoại</span></p>
<p>Vai trò: <span th:text="${user.role}">Vai trò</span></p>
<img th:src="${user.avatarUrl}" alt="Avatar" style="max-width: 200px"/>
</body>
</html>
